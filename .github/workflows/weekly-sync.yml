name: Weekly ORCID + xlsx sync

on:
  schedule:
    # Mondays 01:00 UTC = 09:00 Beijing time
    - cron: "0 1 * * 1"
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl

      - name: Run fetch_orcid.py
        run: python scripts/fetch_orcid.py

      - name: Commit and push if changed
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Wenjun Chen"
          git config user.email "75600073+wenjunchen29@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes."
          else
            git commit -m "Weekly ORCID + xlsx sync"
            git push origin main
          fi

      - name: Trigger Pages deploy
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run pages.yml --ref main || true
