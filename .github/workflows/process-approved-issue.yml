name: Process approved form submission

on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: "Issue number to process manually"
        required: true
        type: string

permissions:
  contents: write
  issues: write
  actions: write

jobs:
  process:
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'issues' && github.event.label.name == 'approved')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests openpyxl

      - name: Determine issue number
        id: issue
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "number=${{ inputs.issue_number }}" >> "$GITHUB_OUTPUT"
          else
            echo "number=${{ github.event.issue.number }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run issue processor
        id: process
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -e
          python scripts/process_issue.py "${{ steps.issue.outputs.number }}" 2>&1 | tee process.log

      - name: Commit and push
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Wenjun Chen"
          git config user.email "75600073+wenjunchen29@users.noreply.github.com"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Process approved form submission #${{ steps.issue.outputs.number }}"
            git push origin main
          fi

      - name: Trigger Pages deploy
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh workflow run pages.yml --ref main || true

      - name: Comment success and close
        if: success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "${{ steps.issue.outputs.number }}" \
            --body "Processed and deployed. Site update will be live shortly."
          gh issue close "${{ steps.issue.outputs.number }}"

      - name: Comment failure
        if: failure()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          LOG="$(tail -c 3000 process.log 2>/dev/null || echo 'no log available')"
          {
            echo "Processing failed. Issue will stay open. Recent log:"
            echo ""
            echo '```'
            echo "$LOG"
            echo '```'
          } > /tmp/comment.md
          gh issue comment "${{ steps.issue.outputs.number }}" --body-file /tmp/comment.md
