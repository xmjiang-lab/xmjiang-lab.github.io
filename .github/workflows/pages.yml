name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Inject build date into assets/data/build-info.json
        run: |
          DATE="$(git log -1 --format=%cd --date=format:'%Y-%m-%d')"
          printf '{\n  "last_updated": "%s"\n}\n' "$DATE" > assets/data/build-info.json
          echo "Injected last_updated=$DATE"

      - name: Refresh sitemap.xml lastmod dates
        run: |
          DATE="$(git log -1 --format=%cd --date=format:'%Y-%m-%d')"
          sed -i "s|<lastmod>[^<]*</lastmod>|<lastmod>${DATE}</lastmod>|g" sitemap.xml
          echo "Refreshed sitemap.xml lastmod to $DATE"

      - name: Upload site
        uses: actions/upload-pages-artifact@v3
        with:
          # The site is a flat static site at repo root; no build step.
          path: '.'

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
