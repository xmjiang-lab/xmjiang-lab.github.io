<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>毕业 / 离任登记 · 蒋晓鸣课题组 · SISU</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/form.css">
  <link rel="stylesheet" href="assets/fonts/phosphor/style.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body data-page="graduation-form">

<div id="header-slot"></div>

<section class="form-hero">
  <div class="form-hero-inner">
    <h1>毕业 / 离任登记 / Graduation</h1>
    <p>课题组毕业生或离任成员请填写以下信息。审核通过后将出现在团队成员页面的「毕业生 / 离任成员」一栏。</p>
  </div>
</section>

<main class="form-page">
  <form id="grad-form" class="form-card" autocomplete="off">

    <div class="form-field">
      <label class="form-field-label" for="name_zh">中文姓名 / Chinese name<span class="req">*</span></label>
      <input type="text" id="name_zh" name="name_zh" placeholder="请输入与课题组成员页面一致的姓名" required>
    </div>

    <div class="form-field">
      <label class="form-field-label" for="end_date">离组日期 / End date<span class="req">*</span></label>
      <input type="date" id="end_date" name="end_date" required>
    </div>

    <div class="form-field">
      <label class="form-field-label" for="period_summary">在组时间段 / Period in lab<span class="req">*</span></label>
      <input type="text" id="period_summary" name="period_summary" placeholder="例 2021–2024" required>
    </div>

    <div class="form-field">
      <label class="form-field-label" for="next_position_zh">现任职位（中文）/ Next position (Chinese)<span class="req">*</span></label>
      <input type="text" id="next_position_zh" name="next_position_zh" placeholder="例 麦吉尔大学 博士研究生" required>
    </div>

    <div class="form-field">
      <label class="form-field-label" for="next_position_en">现任职位（英文）/ Next position (English) <span class="hint">(可选 optional)</span></label>
      <input type="text" id="next_position_en" name="next_position_en" placeholder="e.g. PhD candidate, McGill University">
    </div>

    <div class="form-actions">
      <button type="submit" class="form-submit">提交登记 / Submit</button>
    </div>

    <div id="form-status" class="form-status"></div>

    <div class="form-note">
      <strong>提示：</strong>请确认姓名与你当前在「团队成员」页面显示的中文姓名完全一致，否则系统无法匹配。如表单失败，请改用邮件
      <a href="mailto:xiaoming.jiang@shisu.edu.cn">xiaoming.jiang@shisu.edu.cn</a>。
    </div>

    <a class="form-back" href="people.html">← 返回团队成员 / Back to People</a>
  </form>
</main>

<div id="footer-slot"></div>
<script src="assets/js/main.js"></script>
<script src="assets/js/form-submit.js"></script>
<script>
  (function () {
    const form = document.getElementById("grad-form");
    const statusEl = document.getElementById("form-status");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const submitBtn = form.querySelector(".form-submit");
      const fd = new FormData(form);
      const fields = {};
      fd.forEach((v, k) => { fields[k] = v; });
      await window.JiangLabForm.submitForm({
        type: "graduation",
        fields,
        photoFile: null,
        statusEl,
        submitButton: submitBtn,
      });
    });
  })();
</script>
</body>
</html>
