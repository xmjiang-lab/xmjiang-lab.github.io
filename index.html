      <section class="lab-intro" aria-labelledby="lab-intro-h">
        <h1 id="lab-intro-h" class="lab-intro-title" data-i18n="home.h1">理解语言中的情绪、意图与社会意义</h1>
        <p class="lab-intro-sub" data-i18n="home.p1">我们关注人在说话时如何传递情感、态度与意图：这些信息既来自语言本身（说了什么），也来自伴随语言的声音与面部表达（怎么说的）。</p>
      </section>

      <p data-i18n="home.p2">课题组的总体目标，是理解成人在口语交流中如何表达情绪与意图、听者如何解读这些意义，以及背后的脑机制。我们也关注影响言语交流的社会与文化因素，并综合运用声学、行为、电生理（EEG/ERP）与功能性脑成像（fMRI）方法验证理论假设。</p>
