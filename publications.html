<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>发表论文 · 蒋晓鸣课题组 · SISU</title>
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/fonts/phosphor/style.css">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
</head>
<body data-page="publications">

<div id="header-slot"></div>

<main id="main" class="page-single">
  <div class="main-col">
    <h1 data-i18n="publications.h1">发表论文</h1>

    <div class="pub-filter-bar">
      <div class="filter-group">
        <div class="filter-group-label" data-i18n="publications.filter_cat_label">类别</div>
        <div id="cat-filters" class="filter-chips"></div>
      </div>
      <div class="filter-group">
        <div class="filter-group-label" data-i18n="publications.filter_year_label">年份</div>
        <div id="year-filters" class="filter-chips year-chips"></div>
      </div>
      <div class="filter-summary">
        <span class="filter-summary-text">
          <span id="pub-shown-count"></span> / <span id="pub-total-count"></span>
        </span>
        <button class="filter-clear" type="button" onclick="clearAllFilters()">
          <i class="ph-light ph-arrow-counter-clockwise"></i>
          <span data-i18n="publications.filter_clear">清除筛选</span>
        </button>
      </div>
    </div>

    <div id="pub-list">
      <p style="color:#888;font-style:italic;">Loading…</p>
    </div>
  </div>
</main>

<div id="footer-slot"></div>
<script src="assets/js/main.js"></script>
</body>
</html>
